{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ range site.Sections }}
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
  {{ end }}

  <h2>Images from global resources</h2>

  {{ range resources.ByType "image" }}
    {{ with .Process "resize 200x webp" }}
      <img src="{{ .RelPermalink }}" width="{{ .Width }}" height="{{ .Height }}" alt="">
    {{ end }}
  {{ end }}
{{ end }}
