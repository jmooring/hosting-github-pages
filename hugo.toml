baseURL = 'https://jmooring.github.io/hosting-github-pages/'
languageCode = 'en-US'
title = 'Hosting Test - GitHub Pages'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = true
disableKinds = ['RSS', 'taxonomy', 'term']
enableGitInfo = true
timeout = '5m'

[caches.images]
dir = ":cacheDir/images"
maxAge = "1440h" # 60 days

[languages.en]
contentDir = 'content/en'
languageCode = 'en-US'
languageName = 'English'
weight = 1

[languages.de]
contentDir = 'content/de'
languageCode = 'de-DE'
languageName = 'Deutsch'
weight = 2

[[menu.main]]
name = 'Home'
pageRef = '/'
weight = '10'

[[menu.main]]
name = 'Articles'
pageRef = '/articles'
weight = '20'

[[menu.main]]
name = 'Posts'
pageRef = '/posts'
weight = '30'

[module.hugoVersion]
min = '0.146.7'

[[module.imports]]
path = "github.com/jmooring/hugo-module-content"
